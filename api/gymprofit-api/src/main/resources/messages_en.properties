# ---- Recordatorios de comidas (uno por franja horaria) ----
notif.desayuno.titulo=Have you had breakfast yet?
notif.desayuno.mensaje=Start your day with energy: log your breakfast in GymProFit.
notif.almuerzo.titulo=Mid-morning snack time
notif.almuerzo.mensaje=A little boost halfway through the morning. Log your snack!
notif.comida.titulo=What's for lunch?
notif.comida.mensaje=Don't forget to log your lunch to keep your macros on track.
notif.merienda.titulo=Snack time
notif.merienda.mensaje=A well-timed snack keeps your goals on track. Log it!
notif.cena.titulo=Don't forget to log your dinner
notif.cena.mensaje=Wrap up the day by completing your meal log. Great job today!

# ---- Entrenamiento y actividad ----
notif.entrenar.titulo=Time to work out!
notif.entrenar.mensaje=You haven't trained yet today. Push hard and keep the streak alive!
notif.inactividad.titulo=We miss you
notif.inactividad.mensaje=It's been days since your last workout. A short session today is better than none. Come back!
# Resumen semanal: {0} = nº de sesiones, {1} = minutos totales, {2} = kcal totales.
notif.resumen.titulo=Your weekly summary
notif.resumen.mensaje=This week: {0} session(s), {1} min of training and {2} kcal burned. Keep it up!

# ---- Logros y progreso ----
notif.logro.titulo=You're one session away from an achievement!
notif.logro.mensaje=Just one more session to unlock a new achievement. Go for it!
notif.medicion.titulo=How's your progress going?
notif.medicion.mensaje=It's been over a month since your last measurement. Log your weight and check your progress.
# Objetivo próximo a vencer: {0} = descripción del objetivo.
notif.objetivo.titulo=Your goal is about to expire
notif.objetivo.mensaje="{0}" is due in a few days. One last push, you''ve got this!
