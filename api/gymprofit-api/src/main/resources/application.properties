# Perfil activo por defecto
spring.profiles.active=dev

# Nombre de la aplicacion
spring.application.name=GymProFit API

# Configuracion de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JPA
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

server.servlet.context-path=/api

# i18n de notificaciones push (messages.properties = ES default, messages_en = EN).
# Sin fallback al locale del sistema: si el servidor corre con locale "en" (Render/CI),
# pedir "es" caeria a messages_en; con false cae SIEMPRE al bundle base (español).
spring.messages.fallback-to-system-locale=false

# Actuator: solo el endpoint health expuesto (health-check de la PaaS), sin detalles internos
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Firebase Cloud Messaging (push). La service-account key es un SECRETO: se aporta por
# variable de entorno, nunca en el repo. Ambas vacías por defecto = push DESACTIVADO
# (arranque normal, ideal para CI). Prod (Render): FIREBASE_CREDENTIALS_JSON con el JSON.
# Local: FIREBASE_CREDENTIALS_PATH con la ruta al fichero de la key (gitignoreado).
firebase.credentials.json=${FIREBASE_CREDENTIALS_JSON:}
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}