# ============================================================
# Perfil CI — EXCLUSIVO para GitHub Actions.
# Valores de usar y tirar: la BD es un service container efímero y el
# secreto JWT NO es productivo (solo firma tokens durante los tests).
# Este fichero SÍ se versiona (a diferencia de application-dev/prod.properties,
# que están en .gitignore). El resto de config se hereda de application.properties.
# ============================================================

# Datasource → MariaDB efímera levantada por el workflow (127.0.0.1:3306)
spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/gymprofit_db?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JWT — secreto no productivo, solo para que arranque el contexto en los tests
jwt.secret=ZGV2ZWxvcG1lbnRfc2VjcmV0X2tleV9neW1wcm9maXRfMjAyNV92ZXJ5X3NlY3VyZV9rZXlfZm9yX2p3dF90b2tlbnM=
jwt.expiration=1800000
jwt.refresh.expiration=2592000000
