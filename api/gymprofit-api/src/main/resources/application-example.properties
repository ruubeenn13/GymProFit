# Base de datos MariaDB local
spring.datasource.url=jdbc:mariadb://localhost:3308/my_database
spring.datasource.username=root
spring.datasource.password=secret
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Configuracion de conexion
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Logging
logging.level.root=INFO
logging.level.com.gymprofit.api=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# Security JWT (desarrollo - cambiar en produccion)
# El secreto DEBE ser distinto por entorno y venir de una variable de entorno JWT_SECRET
# (Base64 de una clave larga y aleatoria). En dev se puede dejar un default local; en prod NO.
#   dev  -> jwt.secret=${JWT_SECRET:<clave_base64_de_desarrollo>}
#   prod -> jwt.secret=${JWT_SECRET}   (sin default; la app no arranca si no está definida)
jwt.secret=${JWT_SECRET:my_dev_secret_base64}
# Caducidad del access token en ms (recomendado corto, p. ej. 1800000 = 30 min)
jwt.expiration=1800000
# Caducidad del refresh token en ms (largo, p. ej. 2592000000 = 30 dias)
jwt.refresh.expiration=2592000000