# ============================================================
# messages.properties — textos de las notificaciones push (ESPAÑOL, idioma por defecto).
# Spring Boot autoconfigura el MessageSource con basename "messages" y UTF-8.
# Una clave por título y otra por mensaje de cada generador de RecordatorioNotificacionesTask.
# OJO: en los mensajes con placeholders {0} aplica MessageFormat → las comillas
# simples se escapan duplicándolas ('').
# ============================================================

# ---- Recordatorios de comidas (uno por franja horaria) ----
notif.desayuno.titulo=¿Ya has desayunado?
notif.desayuno.mensaje=Empieza el día con energía: registra tu desayuno en GymProFit.
notif.almuerzo.titulo=Hora del almuerzo
notif.almuerzo.mensaje=Un pequeño empujón a media mañana. ¡Registra tu almuerzo!
notif.comida.titulo=¿Qué hay para comer?
notif.comida.mensaje=No olvides registrar tu comida para llevar tus macros al día.
notif.merienda.titulo=Hora de la merienda
notif.merienda.mensaje=Una merienda a tiempo mantiene tus objetivos en marcha. ¡Regístrala!
notif.cena.titulo=No olvides registrar tu cena
notif.cena.mensaje=Cierra el día completando tu registro de comidas. ¡Buen trabajo hoy!

# ---- Entrenamiento y actividad ----
notif.entrenar.titulo=¡Hora de entrenar!
notif.entrenar.mensaje=Hoy todavía no has entrenado. ¡Dale caña y mantén la racha!
notif.inactividad.titulo=Te echamos de menos
notif.inactividad.mensaje=Hace días que no entrenas. Una sesión corta hoy es mejor que ninguna. ¡Vuelve!
# Resumen semanal: {0} = nº de sesiones, {1} = minutos totales, {2} = kcal totales.
notif.resumen.titulo=Tu resumen semanal
notif.resumen.mensaje=Esta semana: {0} sesión(es), {1} min de entrenamiento y {2} kcal quemadas. ¡Sigue así!

# ---- Logros y progreso ----
notif.logro.titulo=¡Estás a una sesión de un logro!
notif.logro.mensaje=Solo te falta una sesión para desbloquear un nuevo logro. ¡A por ella!
notif.medicion.titulo=¿Cómo va tu progreso?
notif.medicion.mensaje=Hace más de un mes de tu última medición. Registra tu peso y comprueba tu evolución.
# Objetivo próximo a vencer: {0} = descripción del objetivo.
notif.objetivo.titulo=Tu objetivo está cerca de vencer
notif.objetivo.mensaje="{0}" vence en pocos días. ¡Último empujón, tú puedes!
