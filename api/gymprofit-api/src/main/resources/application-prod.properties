# ============================================================
# Perfil PROD — 12-factor: TODOS los datos sensibles vienen de variables
# de entorno inyectadas por la PaaS (Render/Koyeb). Este fichero NO contiene
# secretos, por eso SÍ se versiona. La config común se hereda de
# application.properties.
# ============================================================

# --- Datasource (BD gestionada, p.ej. Aiven MySQL) ---
# El driver mariadb conecta contra MySQL sin problema. La URL/usuario/password
# se pasan como variables de entorno desde la PaaS.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Pool de conexiones
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# --- JPA/Hibernate ---
# Sin dialecto explícito: Hibernate lo autodetecta de la conexión (MySQL en Aiven).
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

# --- Flyway (crea/valida el esquema al arrancar contra la BD gestionada) ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# --- jOOQ ---
# Dialecto FIJADO a mano, no deducido de la conexion. Sin esto, jOOQ generaba SQL estandar
# (OFFSET ... ROWS FETCH NEXT ... ROWS ONLY) que MySQL no entiende, y toda consulta paginada
# (GET /admin/usuarios) reventaba con 500 solo en produccion.
spring.jooq.sql-dialect=MYSQL

# --- JWT (secreto SIEMPRE por entorno; nunca en el repo) ---
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:1800000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:2592000000}

# --- Servidor ---
# La PaaS asigna el puerto por la variable PORT; default 8080 en local.
server.port=${PORT:8080}

# --- Subida de fotos de perfil ---
# En un contenedor efímero el disco no persiste; ruta escribible temporal.
# (Para persistencia real habría que usar almacenamiento externo/objeto.)
app.upload.dir=${APP_UPLOAD_DIR:/tmp/uploads/fotos-perfil}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# --- Rate limiting por IP (2 niveles) ---
# Nivel estricto (login/register/guest/refresh/change-password): anti fuerza bruta.
app.auth.rate-limit.enabled=true
app.auth.rate-limit.max-requests=15
app.auth.rate-limit.window-seconds=60
# Nivel global (resto de rutas): backstop anti scraping/DoS; cupo alto que un usuario real no alcanza.
app.rate-limit.global.max-requests=200
app.rate-limit.global.window-seconds=60

# --- Logging ---
logging.level.root=INFO
logging.level.com.gymprofit.api=INFO

# --- Swagger deshabilitado en producción (no exponer el mapa de la API) ---
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
