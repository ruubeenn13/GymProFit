# ============================================================
# CI — Build + Tests de la API (Spring Boot)
# Se ejecuta en cada push a main y en cada pull request.
# Es el gate que valida el auto-merge de Dependabot antes de fusionar.
# ============================================================
name: CI

on:
  push:
    branches: [ main ]
    # Los commits solo-documentación (p. ej. actualizar CHANGELOG con el hash) NO
    # disparan CI: así el run del commit de código anterior no queda "cancelado"
    # por el push del changelog. En los PR NO se ignora nada (el gate de Dependabot
    # siempre corre).
    paths-ignore:
      - '**/*.md'
      - 'documentacion/**'
  pull_request:

# Cancela ejecuciones antiguas de la misma rama/PR si llega un push nuevo
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-build-test:
    name: api-build-test
    runs-on: ubuntu-latest

    # Todos los pasos Maven corren dentro del módulo de la API
    defaults:
      run:
        working-directory: api/gymprofit-api

    # ----------------------------------------------------------
    # Service container: MariaDB efímera para los @SpringBootTest.
    # Flyway crea el esquema y Hibernate (ddl-auto=validate) lo valida.
    # ----------------------------------------------------------
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: "12345"
          MARIADB_DATABASE: gymprofit_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      # 1) Clona el repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2) JDK 21 (Temurin) + cache de dependencias Maven
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # 3) Build + tests con el perfil 'ci' (application-ci.properties: datasource
      #    a la MariaDB efímera + secreto JWT no productivo). El perfil dev/prod
      #    NO se versiona, por eso se usa uno propio para CI.
      #    jOOQ compila desde las fuentes versionadas (src/generated/jooq); no
      #    se regenera (skip=true), así no hace falta BD en fase de compilación.
      - name: Build & test
        env:
          SPRING_PROFILES_ACTIVE: ci
          # El logback escribe en /home/ubuntu/logs por defecto (ruta del server);
          # en el runner se redirige a un dir escribible del temporal.
          LOG_DIR: ${{ runner.temp }}/gymprofit-logs
        run: sh ./mvnw -B verify
