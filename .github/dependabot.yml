# Dependabot — actualizaciones automáticas de dependencias (incluye avisos de seguridad).
# GitHub abre PRs cuando hay versiones nuevas o vulnerabilidades conocidas en las dependencias.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # API Spring Boot (Maven)
  - package-ecosystem: "maven"
    directory: "/api/gymprofit-api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # App Android (Gradle)
  - package-ecosystem: "gradle"
    directory: "/app/GymProFit"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # Workflows de GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
